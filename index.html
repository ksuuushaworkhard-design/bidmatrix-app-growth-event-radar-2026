<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Embeddable BidMatrix event search widget for 2026 app growth events">
  <title>App Growth Event Radar 2026 | BidMatrix</title>
  <link rel="stylesheet" href="styles.css?v=date-badge-compact">
</head>
<body>
  <main class="widget-shell">
    <section class="search-panel" aria-label="Search 2026 events">
      <label class="search-box" for="searchInput">
        <span>Search events</span>
        <input id="searchInput" type="search" placeholder="Search by event, city, category or goal">
      </label>

      <div class="quick-filters" aria-label="Quick filters">
        <button type="button" class="chip" data-filter-type="category" data-filter-field="mainCategory" data-filter-value="Mobile / App Growth">App Growth</button>
        <button type="button" class="chip" data-filter-type="category" data-filter-field="verticalTags" data-filter-value="Gaming">Gaming</button>
        <button type="button" class="chip" data-filter-type="category" data-filter-field="verticalTags" data-filter-value="iGaming">iGaming</button>
        <button type="button" class="chip" data-filter-type="category" data-filter-field="verticalTags" data-filter-value="Affiliate">Affiliate</button>
        <button type="button" class="chip" data-filter-type="category" data-filter-field="verticalTags" data-filter-value="AdTech">AdTech</button>
        <button type="button" class="chip" data-filter-type="category" data-filter-field="verticalTags" data-filter-value="Programmatic">Programmatic</button>
        <button type="button" class="chip" data-filter-type="region" data-filter-field="region" data-filter-value="Europe">Europe</button>
        <button type="button" class="chip" data-filter-type="region" data-filter-field="region" data-filter-value="APAC">APAC</button>
        <button type="button" class="chip" data-filter-type="region" data-filter-field="region" data-filter-value="North America">North America</button>
        <button type="button" class="chip" data-filter-type="goalTags" data-filter-field="goalTags" data-filter-value="Lead generation">Lead Generation</button>
        <button type="button" class="chip" data-filter-type="goalTags" data-filter-field="goalTags" data-filter-value="Partnerships">Partnerships</button>
      </div>

      <div class="filter-controls">
        <label for="regionFilter">
          <span>Region</span>
          <select id="regionFilter" data-filter="region"></select>
        </label>
        <label for="mainCategoryFilter">
          <span>Category</span>
          <select id="mainCategoryFilter" data-filter="mainCategory"></select>
        </label>
        <label for="quarterFilter">
          <span>Quarter</span>
          <select id="quarterFilter" data-filter="quarter"></select>
        </label>
        <button type="button" id="applyFilters" class="primary-button">Apply</button>
        <button type="button" id="clearFilters" class="secondary-button">Clear filters</button>
      </div>

      <p id="resultCount" class="result-count">Loading events...</p>
    </section>

    <section class="events-section" aria-live="polite">
      <div id="eventsGrid" class="events-grid"></div>
      <div id="emptyState" class="empty-state" hidden>
        <h2>No matching events found</h2>
        <p>Try changing your search or selecting broader filters.</p>
        <button type="button" class="empty-clear secondary-button">Clear filters</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
